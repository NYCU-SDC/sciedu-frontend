name: Deploy Pull Request Snapshot

on:
    pull_request:

permissions:
    contents: read

jobs:
    Lint:
        name: Lint with ESLint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ESLint
              run: pnpm lint

    Format:
        name: Check formatting with Prettier
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Prettier
              run: pnpm format

    TypeCheck:
        name: Type check with tsc
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tsc
              run: pnpm typecheck

    Build-Push-Image:
        name: Build Docker image
        needs: [Lint, Format, TypeCheck]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
                  password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

            - name: Build and Push Docker image
              uses: docker/build-push-action@v7
              with:
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  push: true
                  tags: |
                      nycusdc/sciedu-frontend:pr-${{ github.event.number }}
                      nycusdc/sciedu-frontend:${{ github.sha }}
                  context: .
                  build-args: |
                      VITE_BUILD_MODE=development
                      VITE_BACKEND_BASE_URL=https://dev.sciedu.sdc.nycu.club
                      VITE_APP_MODE=llm
                      VITE_DEV_ENABLE_ALL_FEATURES=true

    Deploy:
        name: Deploy
        needs: Build-Push-Image
        runs-on: ubuntu-latest
        steps:
            - name: Extract PR body for webhook
              uses: NYCU-SDC/Extract-PRbody@V1.0
              id: extract
              with:
                  pr_body: ${{ github.event.pull_request.body }}

            - name: Process PR body for webhook
              run: |
                  PR_TYPE=$(echo "${{ steps.extract.outputs.type_block }}" | jq -R -s @json)
                  PR_PURPOSE=$(echo "${{ steps.extract.outputs.purpose_block }}" | jq -R -s @json)
                  echo "PR_TYPE=$PR_TYPE" >> $GITHUB_ENV
                  echo "PR_PURPOSE=$PR_PURPOSE" >> $GITHUB_ENV

            - name: Trigger n8n Snapshot Webhook
              run: |
                  curl --location --request POST 'https://webhook.sdc.nycu.club/webhook/deploy' \
                    --header 'Content-Type: application/json' \
                    --header 'x-deploy-token: ${{ secrets.N8N_DEPLOY_TOKEN }}' \
                      --data-raw '{
                    "source": {
                      "title": "SciEdu",
                      "repo": "${{ github.repository }}",
                      "branch": "${{ github.head_ref || github.ref_name }}",
                      "commit": "${{ github.sha }}",
                      "pr_number": "${{ github.event.pull_request.number }}",
                      "pr_title": "${{ github.event.pull_request.title }}",
                      "pr_type": ${{ env.PR_TYPE }},
                      "pr_purpose": ${{ env.PR_PURPOSE }}
                    },
                    "method": "deploy",
                    "metadata": {
                      "environment": "snapshot",
                        "component": "frontend"
                    },
                    "post": {
                      "notify_discord": {
                        "enable": true,
                        "channel": "sciedu-activity"
                      },
                      "setup_domain": {
                        "enable": true,
                        "title": "Endpoint",
                        "name": "pr-${{ github.event.pull_request.number }}.sciedu.sdc.nycu.club",
                        "value": "default-eng-deploy:internal"
                      }
                    }
                  }'
